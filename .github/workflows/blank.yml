name: Terraform CI/CD

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show files
        run: ls -R

      - name: Terraform Init
        working-directory: envs/dev
        run: terraform init
